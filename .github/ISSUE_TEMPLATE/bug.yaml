---
name: Bug report
description: Report a reproducible OTClient problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve OTClient. Search existing issues first and complete every required environment field.

        **Do not disclose security vulnerabilities here.** Report them privately through the repository Security tab.

  - type: input
    id: client-commit
    attributes:
      label: OTClient commit or version
      description: Provide the exact commit SHA, tag, or release. The latest commit in your checkout is shown by `git rev-parse HEAD`.
      placeholder: "e.g. 0123456789abcdef..."
    validations:
      required: true

  - type: input
    id: canary-version
    attributes:
      label: Canary version
      description: Provide the exact Canary release, tag, or commit SHA.
      placeholder: "e.g. v3.x or a full commit SHA"
    validations:
      required: true

  - type: input
    id: protocol-version
    attributes:
      label: Client protocol version
      description: Enter the protocol selected by the client, not only the game marketing version.
      placeholder: "e.g. 1321"
    validations:
      required: true

  - type: input
    id: operating-system
    attributes:
      label: Operating system
      description: Include platform, exact version, and architecture.
      placeholder: "e.g. Windows 11 24H2 x64 or Ubuntu 24.04 x86_64"
    validations:
      required: true

  - type: textarea
    id: assets
    attributes:
      label: Client assets
      description: Identify the things/sounds asset versions and source, and state whether files are original or customized.
      placeholder: |
        Things version and source:
        Sounds version and source:
        Original or customized:
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide a minimal, deterministic sequence starting from client launch.
      placeholder: |
        1. Start the client with ...
        2. Connect to ...
        3. Perform ...
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: What happened instead? Include frequency and visible symptoms.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs, crash output, or screenshots
      description: Paste sanitized logs or attach files. Remove credentials, tokens, character data, and private server details. If no output exists, state that explicitly.
      render: shell
    validations:
      required: true

  - type: dropdown
    id: cipsoft-client
    attributes:
      label: Does the problem occur in the corresponding CipSoft client?
      description: Test the same account and server flow when possible.
      options:
        - "No"
        - "Yes"
        - "Not tested"
        - "Not applicable"
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add relevant feature flags, server configuration, recent changes, or workarounds.

  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      options:
        - label: I searched for an existing report of this problem.
          required: true
        - label: This report does not disclose an active security vulnerability or sensitive credentials.
          required: true

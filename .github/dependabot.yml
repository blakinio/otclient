---
version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Europe/Warsaw"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"

  # All supported Dockerfiles are stored in the repository root.
  - package-ecosystem: "docker"
    directory: "/"
    exclude-paths:
      - "Dockerfile.browser.sh"  # Shell wrapper, not a Dockerfile manifest.
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:30"
      timezone: "Europe/Warsaw"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"

name: Apply PR 9 Windows Link Fix

on:
  push:
    branches: [fix/protocol-game-session-reentrancy]

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: fix/protocol-game-session-reentrancy
          fetch-depth: 0

      - name: Apply portable lifecycle test seam
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          header = Path('src/client/game.h')
          text = header.read_text()
          old = '    friend class ProtocolGame;\n    friend class Map;\n'
          new = (
              '    friend class ProtocolGame;\n'
              '    friend class Map;\n'
              '    friend class GameLifecycleTestAccess;\n'
          )
          if old not in text:
              raise SystemExit('Game friend block not found')
          header.write_text(text.replace(old, new, 1))
          PY

          cp \
            .github/pr9-windows-fix/protocol_game_lifecycle_test.cpp \
            tests/unit/protocol/protocol_game_lifecycle_test.cpp

          rm -rf .github/pr9-windows-fix
          rm -f .github/workflows/apply-pr9-windows-link-fix.yml

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m \
            "test(protocol): use a portable game lifecycle access seam"
          git push origin HEAD:fix/protocol-game-session-reentrancy

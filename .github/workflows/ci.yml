name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]
  merge_group:
    branches: [main]
    types: [checks_requested]
  push:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Build Scope
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      compile: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'merge_group') && 'true' || steps.filter.outputs.compile }}
      macos: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'merge_group') && 'true' || steps.filter.outputs.macos }}
      android: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'merge_group') && 'true' || steps.filter.outputs.android }}
      docker: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'merge_group') && 'true' || steps.filter.outputs.docker }}
      browser: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'merge_group') && 'true' || steps.filter.outputs.browser }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect changed paths
        id: filter
        if: github.event_name != 'workflow_dispatch' && github.event_name != 'merge_group'
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36  # v3.0.2
        with:
          filters: |
            compile:
              - "src/**"
              - "tests/**"
              - "cmake/**"
              - "vc18/**"
              - "vcpkg.json"
              - "vcpkg-configuration.json"
              - "CMakeLists.txt"
              - "CMakePresets.json"
              - ".github/workflows/ci.yml"
              - ".github/workflows/reusable-build-linux.yml"
              - ".github/workflows/reusable-build-windows.yml"
            macos:
              - "src/**"
              - "cmake/**"
              - "vcpkg.json"
              - "vcpkg-configuration.json"
              - "CMakeLists.txt"
              - "CMakePresets.json"
              - ".github/workflows/ci.yml"
              - ".github/workflows/reusable-build-macos.yml"
            android:
              - "src/**"
              - "android/**"
              - "cmake/**"
              - "CMakeLists.txt"
              - "vcpkg.json"
              - "vcpkg-configuration.json"
              - "build_luajit_android.sh"
              - "setup_android_deps.sh"
              - "Dockerfile.android"
              - ".github/workflows/ci.yml"
              - ".github/workflows/reusable-build-android-apk.yml"
            docker:
              - "Dockerfile"
              - ".dockerignore"
              - "src/**"
              - "cmake/**"
              - "vcpkg.json"
              - "vcpkg-configuration.json"
              - "CMakeLists.txt"
              - "CMakePresets.json"
              - ".github/workflows/ci.yml"
              - ".github/workflows/reusable-build-docker.yml"
            browser:
              - "Dockerfile.browser"
              - "Dockerfile.browser.sh"
              - "browser/**"
              - "src/**"
              - "cmake/**"
              - "vcpkg.json"
              - "vcpkg-configuration.json"
              - "CMakeLists.txt"
              - ".github/workflows/ci.yml"
              - ".github/workflows/reusable-build-browser.yml"

  checks:
    name: Fast Checks
    permissions:
      contents: read
      checks: write
      pull-requests: read
    uses: ./.github/workflows/reusable-checks.yml

  tests-lua:
    name: Lua Syntax
    permissions:
      contents: read
    uses: ./.github/workflows/reusable-tests-lua.yml

  build-linux:
    name: Build - Linux
    needs: [changes, checks, tests-lua]
    if: needs.changes.outputs.compile == 'true' && needs.checks.result == 'success' && needs.tests-lua.result == 'success' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/reusable-build-linux.yml

  build-windows:
    name: Build - Windows
    needs: [changes, checks, tests-lua]
    if: needs.changes.outputs.compile == 'true' && needs.checks.result == 'success' && needs.tests-lua.result == 'success' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/reusable-build-windows.yml

  build-macos:
    name: Build - macOS
    needs: [changes, checks, tests-lua]
    if: needs.changes.outputs.macos == 'true' && needs.checks.result == 'success' && needs.tests-lua.result == 'success' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    permissions:
      contents: read
    uses: ./.github/workflows/reusable-build-macos.yml

  build-android-apk:
    name: Build - Android APK
    needs: [changes, checks, tests-lua]
    if: needs.changes.outputs.android == 'true' && needs.checks.result == 'success' && needs.tests-lua.result == 'success' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    permissions:
      contents: read
    uses: ./.github/workflows/reusable-build-android-apk.yml

  build-docker:
    name: Build - Docker
    needs: [changes, checks, tests-lua]
    if: needs.changes.outputs.docker == 'true' && needs.checks.result == 'success' && needs.tests-lua.result == 'success' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/reusable-build-docker.yml

  build-browser:
    name: Build - Browser
    needs: [changes, checks, tests-lua]
    if: needs.changes.outputs.browser == 'true' && needs.checks.result == 'success' && needs.tests-lua.result == 'success' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    permissions:
      contents: read
    uses: ./.github/workflows/reusable-build-browser.yml

  required:
    name: Required
    if: always()
    needs:
      - changes
      - checks
      - tests-lua
      - build-linux
      - build-windows
      - build-macos
      - build-android-apk
      - build-docker
      - build-browser
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Evaluate required jobs
        env:
          IS_DRAFT: ${{ github.event_name == 'pull_request' && github.event.pull_request.draft && 'true' || 'false' }}
          NEEDS_JSON: ${{ toJSON(needs) }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import sys

          jobs = json.loads(os.environ["NEEDS_JSON"])
          rejected = {}

          for name in ("changes", "checks", "tests-lua"):
              result = jobs[name].get("result")
              if result != "success":
                  rejected[name] = f"expected success, got {result}"

          scopes = jobs["changes"].get("outputs", {})
          for scope in ("compile", "macos", "android", "docker", "browser"):
              if scopes.get(scope) not in {"true", "false"}:
                  rejected[f"scope:{scope}"] = (
                      f"expected true or false, got {scopes.get(scope)!r}"
                  )

          build_scopes = {
              "build-linux": "compile",
              "build-windows": "compile",
              "build-macos": "macos",
              "build-android-apk": "android",
              "build-docker": "docker",
              "build-browser": "browser",
          }
          is_draft = os.environ["IS_DRAFT"] == "true"
          for name, scope in build_scopes.items():
              result = jobs[name].get("result")
              if result not in {"success", "skipped"}:
                  rejected[name] = f"unexpected conclusion {result}"
              elif not is_draft and scopes.get(scope) == "true" and result != "success":
                  rejected[name] = f"scope {scope}=true requires success, got {result}"

          print("Required job results:")
          for name in sorted(jobs):
              print(f"- {name}: {jobs[name].get('result')}")

          if rejected:
              for name, reason in sorted(rejected.items()):
                  print(f"::error title=Required CI job did not pass::{name}: {reason}")
              sys.exit(1)
          PY

---
name: Cleanup caches by branch

on:
  pull_request:
    types:
      - closed

permissions: {}

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Cleanup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: refs/pull/${{ github.event.pull_request.number }}/merge
        run: |
          set -euo pipefail
          echo "Fetching cache IDs for ${BRANCH}"
          cache_ids="$(gh cache list --repo "${REPO}" --ref "${BRANCH}" --limit 100 --json id --jq '.[].id')"

          if [[ -z "${cache_ids}" ]]; then
            echo "No pull request caches found."
            exit 0
          fi

          while IFS= read -r cache_id; do
            [[ -n "${cache_id}" ]] || continue
            gh cache delete "${cache_id}" --repo "${REPO}"
          done <<< "${cache_ids}"

          echo "Cache cleanup complete."

---
name: Dependabot Auto-merge

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions: {}

jobs:
  enable-automerge:
    name: Enable native auto-merge after CI
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]' &&
      github.event.workflow_run.repository.full_name == github.repository &&
      github.event.workflow_run.pull_requests[0].number != null
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read
      contents: write
      pull-requests: write
    steps:
      # workflow_run uses trusted default-branch workflow code and receives a
      # write token even though Dependabot's preceding PR workflow is read-only.
      # These steps never check out or execute PR code or artifact contents.
      - name: Validate successful CI and live pull request
        id: pr
        env:
          CI_HEAD_SHA: ${{ github.event.workflow_run.pull_requests[0].head.sha }}
          CI_RUN_ID: ${{ github.event.workflow_run.id }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "${CI_RUN_ID}" =~ ^[0-9]+$ || ! "${PR_NUMBER}" =~ ^[0-9]+$ ]]; then
            echo "::error title=Invalid workflow metadata::CI run and pull request IDs must be numeric."
            exit 1
          fi
          if [[ ! "${CI_HEAD_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error title=Invalid workflow metadata::The CI pull request head SHA is missing or malformed."
            exit 1
          fi

          required_jobs="$(
            gh api --paginate \
              "repos/${REPOSITORY}/actions/runs/${CI_RUN_ID}/jobs?filter=latest&per_page=100" \
              --jq '.jobs[] | select(.name == "Required" and .conclusion == "success") | .id'
          )"
          if [[ "$(printf '%s\n' "${required_jobs}" | sed '/^$/d' | wc -l)" -ne 1 ]]; then
            echo "::error title=Required CI did not pass::The triggering CI run must contain exactly one successful Required job."
            exit 1
          fi

          pr_json="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}")"
          author="$(jq -r '.user.login // ""' <<< "${pr_json}")"
          state="$(jq -r '.state // ""' <<< "${pr_json}")"
          draft="$(jq -r '.draft // true' <<< "${pr_json}")"
          base_ref="$(jq -r '.base.ref // ""' <<< "${pr_json}")"
          head_ref="$(jq -r '.head.ref // ""' <<< "${pr_json}")"
          head_sha="$(jq -r '.head.sha // ""' <<< "${pr_json}")"
          head_repository="$(jq -r '.head.repo.full_name // ""' <<< "${pr_json}")"

          if [[ "${author}" != "dependabot[bot]" || "${head_repository}" != "${REPOSITORY}" || "${head_ref}" != dependabot/* ]]; then
            echo "::error title=Unexpected pull request::Only same-repository dependabot[bot] branches are eligible."
            exit 1
          fi
          if [[ "${state}" != "open" || "${draft}" != "false" ]]; then
            echo "eligible=false" >> "${GITHUB_OUTPUT}"
            echo "::notice title=Pull request is not eligible::The Dependabot pull request is closed or still a draft."
            exit 0
          fi
          if [[ "${base_ref}" != "main" || "${head_sha}" != "${CI_HEAD_SHA}" ]]; then
            echo "::error title=Stale or unexpected CI::The successful CI run does not match the live Dependabot PR head targeting main."
            exit 1
          fi

          {
            echo "eligible=true"
            echo "pr_number=${PR_NUMBER}"
            echo "head_sha=${head_sha}"
            echo "base_ref=${base_ref}"
            echo "artifact_name=dependabot-metadata-${PR_NUMBER}-${head_sha}"
          } >> "${GITHUB_OUTPUT}"

      - name: Locate trusted metadata artifact
        id: artifact
        if: steps.pr.outputs.eligible == 'true'
        env:
          ARTIFACT_NAME: ${{ steps.pr.outputs.artifact_name }}
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          artifacts_json="$(
            gh api --method GET "repos/${REPOSITORY}/actions/artifacts" \
              -f name="${ARTIFACT_NAME}" \
              -F per_page=100
          )"
          artifact_id="$(jq -r '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | last | .id // empty' <<< "${artifacts_json}")"
          metadata_run_id="$(jq -r '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | last | .workflow_run.id // empty' <<< "${artifacts_json}")"
          if [[ ! "${artifact_id}" =~ ^[0-9]+$ || ! "${metadata_run_id}" =~ ^[0-9]+$ ]]; then
            echo "trusted=false" >> "${GITHUB_OUTPUT}"
            echo "::notice title=Verified Dependabot metadata unavailable::No current trusted metadata artifact exists; this update requires manual review."
            exit 0
          fi

          run_json="$(gh api "repos/${REPOSITORY}/actions/runs/${metadata_run_id}")"
          run_name="$(jq -r '.name // ""' <<< "${run_json}")"
          run_path="$(jq -r '.path // ""' <<< "${run_json}")"
          run_event="$(jq -r '.event // ""' <<< "${run_json}")"
          run_conclusion="$(jq -r '.conclusion // ""' <<< "${run_json}")"
          run_actor="$(jq -r '.actor.login // ""' <<< "${run_json}")"
          run_repository="$(jq -r '.repository.full_name // ""' <<< "${run_json}")"
          if [[ "${run_name}" != "Dependabot Metadata" || "${run_event}" != "pull_request_target" || "${run_conclusion}" != "success" || "${run_actor}" != "dependabot[bot]" || "${run_repository}" != "${REPOSITORY}" ]]; then
            echo "::error title=Untrusted metadata artifact::Artifact provenance does not match the trusted Dependabot metadata workflow."
            exit 1
          fi
          if [[ "${run_path}" != ".github/workflows/dependabot-metadata.yml" && "${run_path}" != ".github/workflows/dependabot-metadata.yml@"* ]]; then
            echo "::error title=Untrusted metadata artifact::Artifact workflow path is not the protected metadata workflow."
            exit 1
          fi

          {
            echo "trusted=true"
            echo "artifact_id=${artifact_id}"
            echo "metadata_run_id=${metadata_run_id}"
          } >> "${GITHUB_OUTPUT}"

      - name: Validate verified Dependabot metadata
        id: metadata
        if: steps.pr.outputs.eligible == 'true' && steps.artifact.outputs.trusted == 'true'
        env:
          ARTIFACT_ID: ${{ steps.artifact.outputs.artifact_id }}
          BASE_REF: ${{ steps.pr.outputs.base_ref }}
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          METADATA_RUN_ID: ${{ steps.artifact.outputs.metadata_run_id }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${ARTIFACT_ID}" =~ ^[0-9]+$ || ! "${METADATA_RUN_ID}" =~ ^[0-9]+$ || ! "${PR_NUMBER}" =~ ^[0-9]+$ || ! "${HEAD_SHA}" =~ ^[0-9a-f]{40}$ || "${BASE_REF}" != "main" ]]; then
            echo "::error title=Invalid metadata handoff::Validated step outputs are malformed."
            exit 1
          fi

          mkdir -p metadata-download
          gh api "repos/${REPOSITORY}/actions/artifacts/${ARTIFACT_ID}/zip" > metadata.zip
          unzip -q metadata.zip -d metadata-download
          mapfile -d '' metadata_files < <(find metadata-download -type f -name metadata.json -print0)
          if (( ${#metadata_files[@]} != 1 )); then
            echo "::error title=Invalid metadata artifact::Expected exactly one metadata.json file."
            exit 1
          fi
          metadata_file="${metadata_files[0]}"
          if ! jq -e '
            type == "object" and
            (.pr_number | type == "number") and
            (.metadata_run_id | type == "number") and
            (.head_sha | type == "string") and
            (.base_ref | type == "string") and
            (.head_repository | type == "string") and
            (.author | type == "string") and
            (.update_type | type == "string") and
            (.maintainer_changes | type == "string")
          ' "${metadata_file}" >/dev/null; then
            echo "::error title=Invalid metadata artifact::Metadata schema validation failed."
            exit 1
          fi

          artifact_pr="$(jq -r '.pr_number' "${metadata_file}")"
          artifact_run="$(jq -r '.metadata_run_id' "${metadata_file}")"
          artifact_head="$(jq -r '.head_sha' "${metadata_file}")"
          artifact_base="$(jq -r '.base_ref' "${metadata_file}")"
          artifact_repository="$(jq -r '.head_repository' "${metadata_file}")"
          artifact_author="$(jq -r '.author' "${metadata_file}")"
          update_type="$(jq -r '.update_type' "${metadata_file}")"
          maintainer_changes="$(jq -r '.maintainer_changes' "${metadata_file}")"
          if [[ "${artifact_pr}" != "${PR_NUMBER}" || "${artifact_run}" != "${METADATA_RUN_ID}" || "${artifact_head}" != "${HEAD_SHA}" || "${artifact_base}" != "${BASE_REF}" || "${artifact_repository}" != "${REPOSITORY}" || "${artifact_author}" != "dependabot[bot]" ]]; then
            echo "::error title=Stale or forged metadata::Artifact values do not match the live pull request and artifact provenance."
            exit 1
          fi
          if [[ "${maintainer_changes}" != "false" ]]; then
            echo "eligible=false" >> "${GITHUB_OUTPUT}"
            echo "::notice title=Maintainer changes require review::Dependabot metadata reports non-bot changes; auto-merge remains disabled."
            exit 0
          fi
          if [[ "${update_type}" != "version-update:semver-patch" && "${update_type}" != "version-update:semver-minor" ]]; then
            echo "eligible=false" >> "${GITHUB_OUTPUT}"
            echo "::notice title=Manual dependency review required::Dependabot update type '${update_type}' is not eligible for automatic merge."
            exit 0
          fi
          echo "eligible=true" >> "${GITHUB_OUTPUT}"

      - name: Verify repository policy and enable squash auto-merge
        if: steps.pr.outputs.eligible == 'true' && steps.artifact.outputs.trusted == 'true' && steps.metadata.outputs.eligible == 'true'
        env:
          BASE_REF: ${{ steps.pr.outputs.base_ref }}
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${BASE_REF}" != "main" || ! "${PR_NUMBER}" =~ ^[0-9]+$ || ! "${HEAD_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error title=Invalid policy handoff::Base branch, head SHA, or pull request number is invalid."
            exit 1
          fi
          if [[ "$(gh api "repos/${REPOSITORY}" --jq '.allow_auto_merge')" != "true" ]]; then
            echo "::error title=Repository auto-merge is disabled::Run scripts/configure-github-repository.sh --apply after maintainer approval."
            exit 1
          fi

          encoded_base_ref="$(jq -rn --arg value "${BASE_REF}" '$value | @uri')"
          protection_endpoint="repos/${REPOSITORY}/branches/${encoded_base_ref}/protection/required_status_checks"
          required_check_present="false"
          if legacy_required="$(
            gh api "${protection_endpoint}" \
              --jq '([.contexts[]?] + [.checks[]?.context]) | any(. == "CI / Required")' \
              2>/dev/null
          )"; then
            required_check_present="${legacy_required}"
          fi

          if [[ "${required_check_present}" != "true" ]]; then
            branch_endpoint="repos/${REPOSITORY}/branches/${encoded_base_ref}"
            if branch_required="$(
              gh api "${branch_endpoint}" \
                --jq '([.protection.required_status_checks.contexts[]?] + [.protection.required_status_checks.checks[]?.context]) | any(. == "CI / Required")'
            )"; then
              required_check_present="${branch_required}"
            fi
          fi

          if [[ "${required_check_present}" != "true" ]]; then
            rules_endpoint="repos/${REPOSITORY}/rules/branches/${encoded_base_ref}"
            if ! required_check_present="$(
              gh api "${rules_endpoint}" \
                --jq '[.[] | select(.type == "required_status_checks") | .parameters.required_status_checks[]?.context] | any(. == "CI / Required")'
            )"; then
              echo "::error title=Required status checks unavailable::The base branch has no readable branch protection or active ruleset requiring CI / Required."
              exit 1
            fi
          fi
          if [[ "${required_check_present}" != "true" ]]; then
            echo "::error title=Required CI check is not protected::Base branch '${BASE_REF}' must require the exact status context 'CI / Required'."
            exit 1
          fi

          current_head="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" --jq '.head.sha')"
          if [[ "${current_head}" != "${HEAD_SHA}" ]]; then
            echo "::error title=Pull request changed during validation::Refusing to enable auto-merge for a different head commit."
            exit 1
          fi

          gh pr merge --auto --squash --match-head-commit "${HEAD_SHA}" \
            "https://github.com/${REPOSITORY}/pull/${PR_NUMBER}"

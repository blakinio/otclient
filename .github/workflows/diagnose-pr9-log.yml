name: Diagnose PR 9 Windows Log

on:
  push:
    branches: [diag/pr9-windows-log]

permissions:
  actions: read
  contents: read

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Download failed job log
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl --fail --location \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/87056639048/logs" \
            --output job.log

          {
            echo "=== compiler and build errors ==="
            grep -E -i -C 4 "error C[0-9]+|fatal error|FAILED:|ninja: build stopped|error:|LNK[0-9]+" job.log || true
            echo
            echo "=== final 250 lines ==="
            tail -n 250 job.log
          } > diagnostic.txt

      - name: Upload diagnostic
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: pr9-windows-error
          path: diagnostic.txt

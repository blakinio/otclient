name: Diagnose PR 9 YAML Log

on:
  pull_request:
    branches: [main]
    types: [reopened, synchronize]

permissions:
  actions: read
  contents: read

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Download failed job log
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl --fail --location \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/87069976565/logs" \
            --output job.log

          {
            echo "=== yamllint errors ==="
            grep -E -i -C 5 "yamllint|syntax error|trailing spaces|wrong indentation|too many spaces|missing document|truthy|line too long|new line" job.log || true
            echo
            echo "=== final 120 lines ==="
            tail -n 120 job.log
          } > diagnostic.txt

      - name: Upload diagnostic
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: pr9-yamllint-error
          path: diagnostic.txt

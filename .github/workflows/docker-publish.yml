name: Docker Publish

on:
  push:
    branches: [main]
    paths:
      - ".dockerignore"
      - "Dockerfile"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "cmake/**"
      - "data/**"
      - "mods/**"
      - "modules/**"
      - "src/**"
      - "vcpkg.json"
      - "vcpkg-configuration.json"
      - "init.lua"
      - "otclientrc.lua"
      - "cacert.pem"
      - ".github/workflows/docker-publish.yml"

permissions: {}

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish GHCR image
    if: github.repository == 'blakinio/otclient' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Convert repository name to lowercase
        id: repo_lower
        shell: bash
        run: echo "value=${REPO,,}" >> "${GITHUB_OUTPUT}"
        env:
          REPO: ${{ github.repository }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            VCPKG_FEED_URL=https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
            VCPKG_FEED_USERNAME=${{ github.repository_owner }}
            VCPKG_BINARY_CACHE_ACCESS=readwrite
            VCPKG_BINARY_SOURCES=clear;nuget,https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json,readwrite;nugettimeout,1200
          secrets: github_token=${{ github.token }}
          tags: |
            ghcr.io/${{ steps.repo_lower.outputs.value }}:latest
            ghcr.io/${{ steps.repo_lower.outputs.value }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

name: Reusable Lua Syntax

on:
  workflow_call:

permissions: {}

jobs:
  job:
    name: Check Lua Syntax
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Setup LuaJIT
        run: sudo apt-get update && sudo apt-get install -y luajit

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Compile Lua files
        shell: bash
        run: |
          set -euo pipefail
          for root in data modules mods; do
            if [[ ! -d "${root}" ]]; then
              echo "Missing Lua root: ${root}" >&2
              exit 1
            fi
          done

          mapfile -d '' lua_files < <(
            find data modules mods -type f -name '*.lua' -print0 | sort -z
          )
          if (( ${#lua_files[@]} == 0 )); then
            echo "No Lua files found in runtime roots." >&2
            exit 1
          fi

          failed=0
          for file in "${lua_files[@]}"; do
            echo "=== ${file} ==="
            if ! luajit -b "${file}" /dev/null; then
              failed=1
            fi
          done
          exit "${failed}"

name: Temporary HTTP Header Cleanup

on:
  push:
    branches:
      - feat/OTC-20260721-oteryn-identity-login

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: feat/OTC-20260721-oteryn-identity-login
          fetch-depth: 0

      - name: Add explicit custom-header removal
        shell: python
        run: |
          from pathlib import Path

          def replace(path, old, new):
              p = Path(path)
              text = p.read_text()
              if old not in text:
                  raise SystemExit(f'expected block not found in {path}')
              p.write_text(text.replace(old, new, 1))

          replace(
              'src/framework/net/protocolhttp.h',
              '    void addCustomHeader(const std::string& name, const std::string& value) { m_custom_header[name] = value; }\n',
              '    void addCustomHeader(const std::string& name, const std::string& value) { m_custom_header[name] = value; }\n    void removeCustomHeader(const std::string& name) { m_custom_header.erase(name); }\n',
          )

          replace(
              'src/framework/luafunctions.cpp',
              '    g_lua.bindSingletonFunction("g_http", "addCustomHeader", &Http::addCustomHeader, &g_http);\n',
              '    g_lua.bindSingletonFunction("g_http", "addCustomHeader", &Http::addCustomHeader, &g_http);\n    g_lua.bindSingletonFunction("g_http", "removeCustomHeader", &Http::removeCustomHeader, &g_http);\n',
          )

          replace(
              'modules/corelib/http.lua',
              '''function HTTP.addCustomHeader(headerTable)\n  for name, value in pairs(headerTable) do\n    g_http.addCustomHeader(name, value)\n  end\nend\n''',
              '''function HTTP.addCustomHeader(headerTable)\n  for name, value in pairs(headerTable) do\n    g_http.addCustomHeader(name, value)\n  end\nend\n\nfunction HTTP.removeCustomHeader(name)\n  if not g_http or not g_http.removeCustomHeader then\n    return\n  end\n  g_http.removeCustomHeader(name)\nend\n''',
          )

          replace(
              'modules/client_entergame/oteryn_identity.lua',
              "    HTTP.addCustomHeader({ Authorization = '' })\n",
              "    HTTP.removeCustomHeader('Authorization')\n",
          )

      - name: Commit patch and remove temporary workflow
        run: |
          rm .github/workflows/temporary-http-header-cleanup.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(auth): remove bearer header after ticket request queueing"
          git push origin HEAD:feat/OTC-20260721-oteryn-identity-login

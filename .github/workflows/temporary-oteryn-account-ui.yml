name: Temporary Oteryn Account UI Patch

on:
  push:
    branches:
      - feat/OTC-20260721-oteryn-identity-login

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: feat/OTC-20260721-oteryn-identity-login
          fetch-depth: 0

      - name: Apply account-status UI patch
        shell: python
        run: |
          from pathlib import Path

          path = Path('modules/client_entergame/characterlist.lua')
          text = path.read_text()
          old = "local showBenefits = shouldShowAppearance() and SHOW_PREMIUM_WIDGETS and not isPremiumAccount(account)"
          new = "local showBenefits = shouldShowAppearance() and SHOW_PREMIUM_WIDGETS and (not account or not account.oterynIdentity) and not isPremiumAccount(account)"
          if old not in text:
              raise SystemExit('premium visibility block not found')
          text = text.replace(old, new, 1)

          old = """    if account.subStatus == SubscriptionStatus.Free then\n        accountStatusLabel:setText(('%s%s'):format(tr('Free Account'), status))\n        if accountStatusIcon then\n            accountStatusIcon:setImageSource('/images/game/entergame/nopremium')\n        end\n    elseif account.subStatus == SubscriptionStatus.Premium then\n"""
          new = """    if account.oterynIdentity then\n        accountStatusLabel:setText(('%s%s'):format(tr('Oteryn Account'), status))\n    elseif account.subStatus == SubscriptionStatus.Free then\n        accountStatusLabel:setText(('%s%s'):format(tr('Free Account'), status))\n        if accountStatusIcon then\n            accountStatusIcon:setImageSource('/images/game/entergame/nopremium')\n        end\n    elseif account.subStatus == SubscriptionStatus.Premium then\n"""
          if old not in text:
              raise SystemExit('account status block not found')
          path.write_text(text.replace(old, new, 1))

      - name: Commit patch and remove temporary workflow
        run: |
          rm .github/workflows/temporary-oteryn-account-ui.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(auth): avoid guessing Oteryn subscription status"
          git push origin HEAD:feat/OTC-20260721-oteryn-identity-login

name: Temporary Oteryn Loopback Refactor

on:
  push:
    branches:
      - feat/OTC-20260721-oteryn-identity-login

permissions:
  contents: write

jobs:
  refactor:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: feat/OTC-20260721-oteryn-identity-login
          fetch-depth: 0

      - name: Apply loopback ephemeral-port refactor
        shell: python
        run: |
          from pathlib import Path

          def replace(path, old, new):
              p = Path(path)
              text = p.read_text()
              if old not in text:
                  raise SystemExit(f"expected block not found in {path}")
              p.write_text(text.replace(old, new, 1))

          replace(
              "src/framework/net/server.h",
              """    Server(int port, bool loopbackHttp = false);\n    static ServerPtr create(int port);\n    bool isOpen() const { return m_isOpen; }\n    void close();\n\n    void acceptNext();\n""",
              """    Server(int port, bool loopbackHttp = false);\n    static ServerPtr create(int port);\n    static ServerPtr createLoopbackHttp();\n    bool isOpen() const { return m_isOpen; }\n    int getLocalPort() const;\n    void close();\n\n    void acceptNext();\n""",
          )

          replace(
              "src/framework/net/server.cpp",
              """ServerPtr Server::create(const int port)\n{\n    try {\n        const bool loopbackHttp = port < 0;\n        const long long requestedPort = loopbackHttp ? -static_cast<long long>(port) : static_cast<long long>(port);\n        if (requestedPort < 0 || requestedPort > std::numeric_limits<unsigned short>::max()) {\n            g_logger.error(\"Failed to initialize server: invalid port\");\n            return nullptr;\n        }\n        return std::make_shared<Server>(static_cast<int>(requestedPort), loopbackHttp);\n    } catch (const std::exception& e) {\n        g_logger.error(\"Failed to initialize server: {}\", e.what());\n        return nullptr;\n    }\n}\n\n""",
              """ServerPtr Server::create(const int port)\n{\n    try {\n        if (port < 0 || port > std::numeric_limits<unsigned short>::max()) {\n            g_logger.error(\"Failed to initialize server: invalid port\");\n            return nullptr;\n        }\n        return std::make_shared<Server>(port, false);\n    } catch (const std::exception& e) {\n        g_logger.error(\"Failed to initialize server: {}\", e.what());\n        return nullptr;\n    }\n}\n\nServerPtr Server::createLoopbackHttp()\n{\n    try {\n        return std::make_shared<Server>(0, true);\n    } catch (const std::exception& e) {\n        g_logger.error(\"Failed to initialize loopback HTTP server: {}\", e.what());\n        return nullptr;\n    }\n}\n\nint Server::getLocalPort() const\n{\n    if (!m_isOpen)\n        return 0;\n\n    std::error_code error;\n    const auto endpoint = m_acceptor.local_endpoint(error);\n    if (error)\n        return 0;\n    return static_cast<int>(endpoint.port());\n}\n\n""",
          )

          replace(
              "src/framework/luafunctions.cpp",
              """    g_lua.registerClass<Server>();\n    g_lua.bindClassStaticFunction<Server>(\"create\", &Server::create);\n    g_lua.bindClassMemberFunction<Server>(\"close\", &Server::close);\n    g_lua.bindClassMemberFunction<Server>(\"isOpen\", &Server::isOpen);\n    g_lua.bindClassMemberFunction<Server>(\"acceptNext\", &Server::acceptNext);\n""",
              """    g_lua.registerClass<Server>();\n    g_lua.bindClassStaticFunction<Server>(\"create\", &Server::create);\n    g_lua.bindClassStaticFunction<Server>(\"createLoopbackHttp\", &Server::createLoopbackHttp);\n    g_lua.bindClassMemberFunction<Server>(\"close\", &Server::close);\n    g_lua.bindClassMemberFunction<Server>(\"isOpen\", &Server::isOpen);\n    g_lua.bindClassMemberFunction<Server>(\"getLocalPort\", &Server::getLocalPort);\n    g_lua.bindClassMemberFunction<Server>(\"acceptNext\", &Server::acceptNext);\n""",
          )

          replace(
              "modules/client_entergame/oteryn_identity.lua",
              """local function selectLoopbackListener(state)\n    local seed = tonumber(state:sub(1, 8), 16) or 0\n    local firstPort = 49152 + (seed % 16384)\n    for attempt = 0, 31 do\n        local port = 49152 + ((firstPort - 49152 + attempt * 37) % 16384)\n        local listener = Server.create(-port)\n        if listener then\n            return listener, port\n        end\n    end\n    return nil, nil\nend\n""",
              """local function selectLoopbackListener()\n    local listener = Server.createLoopbackHttp()\n    if not listener then\n        return nil, nil\n    end\n\n    local port = listener:getLocalPort()\n    if type(port) ~= 'number' or port < 1 or port > 65535 then\n        listener:close()\n        return nil, nil\n    end\n    return listener, port\nend\n""",
          )

          replace(
              "modules/client_entergame/oteryn_identity.lua",
              "local listener, port = selectLoopbackListener(state)",
              "local listener, port = selectLoopbackListener()",
          )

      - name: Commit refactor and remove temporary workflow
        run: |
          rm .github/workflows/temporary-oteryn-loopback-refactor.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(auth): use OS-assigned loopback callback port"
          git push origin HEAD:feat/OTC-20260721-oteryn-identity-login

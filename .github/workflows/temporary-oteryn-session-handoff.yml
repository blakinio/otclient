name: Temporary Oteryn Session Handoff Patch

on:
  push:
    branches:
      - feat/OTC-20260721-oteryn-identity-login

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: feat/OTC-20260721-oteryn-identity-login
          fetch-depth: 0

      - name: Move one-shot consume to actual world handoff
        shell: python
        run: |
          from pathlib import Path

          path = Path('modules/client_entergame/characterlist.lua')
          text = path.read_text()

          old = """local function tryLogin(charInfo, tries)\n    tries = tries or 1\n\n    if tries > 50 then\n        return\n    end\n\n    if g_game.isOnline() then\n"""
          new = """local function tryLogin(charInfo, tries)\n    tries = tries or 1\n\n    if tries > 50 then\n        return\n    end\n\n    if G.oterynGameSession and (G.oterynGameSessionConsumed or type(G.sessionKey) ~= 'string' or G.sessionKey == '') then\n        CharacterList.hide(true)\n        displayErrorBox(tr('Login Error'), tr('Your Oteryn game session can no longer be reused. Sign in with Oteryn again.'))\n        return\n    end\n\n    if g_game.isOnline() then\n"""
          if old not in text:
              raise SystemExit('tryLogin precondition block not found')
          text = text.replace(old, new, 1)

          old = """    g_game.loginWorld(G.account, G.password, charInfo.worldName, charInfo.worldHost, charInfo.worldPort,\n                      charInfo.characterName, G.authenticatorToken, G.sessionKey)\n\n    loadBox = displayCancelBox(tr('Please wait'), tr('Connecting to game server...'))\n"""
          new = """    g_game.loginWorld(G.account, G.password, charInfo.worldName, charInfo.worldHost, charInfo.worldPort,\n                      charInfo.characterName, G.authenticatorToken, G.sessionKey)\n\n    if G.oterynGameSession then\n        -- Game::loginWorld synchronously passes the credential to ProtocolGame::login,\n        -- which copies it into ProtocolGame::m_sessionKey before connect() begins.\n        G.sessionKey = ''\n        G.oterynGameSessionConsumed = true\n    end\n\n    loadBox = displayCancelBox(tr('Please wait'), tr('Connecting to game server...'))\n"""
          if old not in text:
              raise SystemExit('world login handoff block not found')
          path.write_text(text.replace(old, new, 1))

          module = Path('modules/client_entergame/entergame.otmod')
          module_text = module.read_text()
          module_text = module_text.replace("    dofile 'oteryn_session_guard'\n", '')
          module_text = module_text.replace("    OterynSessionGuard.init()\n", '')
          module_text = module_text.replace("    OterynSessionGuard.terminate()\n", '')
          module.write_text(module_text)

          guard = Path('modules/client_entergame/oteryn_session_guard.lua')
          if guard.exists():
              guard.unlink()

      - name: Commit patch and remove temporary workflow
        run: |
          rm .github/workflows/temporary-oteryn-session-handoff.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(auth): consume Game Session only after world handoff"
          git push origin HEAD:feat/OTC-20260721-oteryn-identity-login

name: Validate Shell-Safe URL Launch

on:
  workflow_dispatch:
  push:
    branches:
      - fix/OTC-20260724-shell-safe-open-url
    paths:
      - ".github/workflows/validate-shell-safe-open-url.yml"

permissions: {}

jobs:
  linux:
    name: Linux
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/reusable-build-linux.yml

  windows:
    name: Windows
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/reusable-build-windows.yml

  macos:
    name: macOS
    permissions:
      contents: read
    uses: ./.github/workflows/reusable-build-macos.yml

  android:
    name: Android
    permissions:
      contents: read
    uses: ./.github/workflows/reusable-build-android-apk.yml

  required:
    name: Required affected-platform validation
    if: always()
    needs: [linux, windows, macos, android]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Enforce affected-platform results
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os

          results = {
              name: payload.get("result")
              for name, payload in json.loads(os.environ["NEEDS_JSON"]).items()
          }
          failed = {name: result for name, result in results.items() if result != "success"}
          if failed:
              raise SystemExit(f"affected-platform validation failed: {failed}")
          PY
